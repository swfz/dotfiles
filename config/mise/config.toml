[tools]
node = '24.18.0'
ruby = '4.0.5'
go = '1.26.5'
gcloud = 'latest'
awscli = '2.35.16'
deno = 'latest'
jq = '1.8.2'
bat = '0.26.1'
delta = '0.19.2'
terraform = '1.15.7'
python = '3.14.6'
pipx = 'latest'
act = 'latest'
vim = 'latest'
"ubi:peco/peco" = 'latest'
yq = 'latest'
uv = 'latest'
fillin = 'latest'
bun = 'latest'
eza = 'latest'
ubi = 'latest'
vivid = 'latest'
ripgrep = 'latest'
fzf = 'latest'
neovim = 'latest'
"npm:zx" = 'latest'
"npm:opencommit" = 'latest'
"npm:pnpm" = 'latest'
"npm:yarn" = 'latest'
"npm:@google/clasp" = 'latest'
"npm:@github/copilot" = 'latest'
"npm:@openai/codex" = 'latest'
"pipx:mycli" = 'latest'
"pipx:cheat" = 'latest'
"pipx:mkdocs" = 'latest'
"pipx:jc" = 'latest'
"pipx:visidata" = 'latest'
ollama = 'latest'
rust = 'latest'
ghq = "1.10.1"
"ubi:dlvhdr/diffnav" = 'latest'
sqlite = 'latest'
# ubiバックエンドはOS/libcの判別が甘くglibc環境(WSL/Ubuntu)でmusl版を掴むことがある(ELFローダー無しでexec不可)。
# githubバックエンドはOS/arch/libcを自動判別しMac/Linux両対応するためこちらを使う
"github:duckdb/duckdb" = 'latest'
"github:alltuner/mise-completions-sync" = "latest"
"ubi:k1LoW/mo" = "latest"
"ubi:rtk-ai/rtk"= "latest"
"github:sxyazi/yazi" = "latest"

[hooks]
postinstall = "mise-completions-sync --shell zsh"

[settings]
experimental = true
install_before = "7d"

[settings.npm]
package_manager = "pnpm"

[env]
GOOGLE_APPLICATION_CREDENTIALS="{{env.HOME}}/.config/gcloud/private_adc.json"
CLOUDSDK_PYTHON="{{env.HOME}}/.local/share/mise/installs/python/3.12.12/bin/python3"

